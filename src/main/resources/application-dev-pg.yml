# ========================================
# Dev PG 환경 설정
# ========================================

spring:
  datasource:
    # Docker 로컬 PostgreSQL 기본값 (필요 시 ENV로 오버라이드)
    url: ${DEV_PG_DB_URL:jdbc:postgresql://localhost:5432/daybyspring}
    username: ${DEV_PG_DB_USERNAME:postgres}
    password: ${DEV_PG_DB_PASSWORD:localpassword}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  sql:
    init:
      mode: never

logging:
  level:
    com.example.spring: INFO
    org.hibernate.SQL: DEBUG