# ========================================
# Dev MY 환경 설정
# ========================================

spring:
  datasource:
    # Docker 로컬 MySQL 기본값 (필요 시 ENV로 오버라이드)
    url: ${DEV_MY_DB_URL:jdbc:mysql://localhost:3306/daybyspring?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DEV_MY_DB_USERNAME:root}
    password: ${DEV_MY_DB_PASSWORD:localpassword}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  sql:
    init:
      mode: never

logging:
  level:
    com.example.spring: WARN
    org.hibernate.SQL: WARN