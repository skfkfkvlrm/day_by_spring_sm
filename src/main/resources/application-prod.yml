# ========================================
# Prod 환경 설정 (운영 서버)
# ========================================

spring:
  # Supabase PostgreSQL 데이터베이스
  datasource:
    url: ${SUPABASE_DB_URL}
    username: ${SUPABASE_DB_USERNAME}
    password: ${SUPABASE_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      data-source-properties:
        sslmode: ${SUPABASE_DB_SSLMODE:require}

  # JPA 설정
  jpa:
    hibernate:
      ddl-auto: validate  # 운영 환경에서는 validate만 사용
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  # SQL 스크립트 비활성화
  sql:
    init:
      mode: never

# 로깅 레벨 (운영 환경)
logging:
  level:
    com.example.spring: WARN
    org.hibernate.SQL: WARN
    org.springframework.web: WARN

# 서버 최적화
server:
  compression:
    enabled: true
  http2:
    enabled: true

# 운영 환경 이메일 설정
library:
  notification:
    email:
      smtp:
        host: smtp.company.com
        port: 587
        username: ${SMTP_USERNAME}
        password: ${SMTP_PASSWORD}
        auth: true
        starttls:
          enable: true