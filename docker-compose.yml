# ================================================================
# 사용법:
#   MySQL   : docker compose --profile mysql up --build
#   PostgreSQL: docker compose --profile postgres up --build
# ================================================================

services:

  # ── MySQL Stack ─────────────────────────────────────────────
  mysql-db:
    profiles: [mysql]
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: localpassword
      MYSQL_DATABASE: daybyspring
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-plocalpassword"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - mysql_data:/var/lib/mysql

  app-mysql:
    profiles: [mysql]
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev-my
      DEV_MY_DB_URL: "jdbc:mysql://mysql-db:3306/daybyspring?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8"
      DEV_MY_DB_USERNAME: root
      DEV_MY_DB_PASSWORD: localpassword
    depends_on:
      mysql-db:
        condition: service_healthy

  # ── PostgreSQL Stack ─────────────────────────────────────────
  postgres-db:
    profiles: [postgres]
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: daybyspring
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localpassword
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app-postgres:
    profiles: [postgres]
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev-pg
      DEV_PG_DB_URL: jdbc:postgresql://postgres-db:5432/daybyspring
      DEV_PG_DB_USERNAME: postgres
      DEV_PG_DB_PASSWORD: localpassword
    depends_on:
      postgres-db:
        condition: service_healthy

volumes:
  mysql_data:
  postgres_data:
